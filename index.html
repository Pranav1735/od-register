<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OD Entry Form</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="branches.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --accent: #4f9cf9;
    --accent2: #7c3aed;
    --green: #22c55e;
    --red: #ef4444;
    --text: #e8eaf0;
    --muted: #6b7280;
    --input-bg: #12141e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .header {
    text-align: center;
    margin-bottom: 2.5rem;
  }
  .header h1 {
    font-family: 'Space Mono', monospace;
    font-size: 1.6rem;
    color: var(--accent);
    letter-spacing: -0.5px;
  }
  .header p { color: var(--muted); font-size: 0.9rem; margin-top: 0.4rem; }

  .card {
    max-width: 680px;
    margin: 0 auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
  }

  .reg-row {
    display: flex;
    gap: 1rem;
    margin-bottom: 1.5rem;
    align-items: flex-end;
  }
  .reg-row .field { flex: 1; }

  .field { margin-bottom: 1.2rem; }
  .field label {
    display: block;
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 0.45rem;
  }
  .field input, .field select, .field textarea {
    width: 100%;
    background: var(--input-bg);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    padding: 0.65rem 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    border-color: var(--accent);
  }
  .field input.filled {
    border-color: var(--green);
    background: #0d1f14;
    color: var(--green);
    font-weight: 600;
  }
  .field input.error { border-color: var(--red); }
  .field textarea { resize: vertical; min-height: 80px; }
  .field select option { background: var(--surface); }

  .reg-hint {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 0.3rem;
  }
  .reg-hint span { color: var(--accent); font-family: 'Space Mono', monospace; }

  .auto-badge {
    display: inline-block;
    font-size: 0.65rem;
    background: #0d2a0d;
    color: var(--green);
    border: 1px solid var(--green);
    border-radius: 4px;
    padding: 1px 6px;
    margin-left: 0.4rem;
    vertical-align: middle;
  }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 1.5rem 0;
  }

  .submit-btn {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    padding: 0.9rem;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    margin-top: 0.5rem;
  }
  .submit-btn:hover { opacity: 0.88; }
  .submit-btn:active { transform: scale(0.98); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--green);
    color: #fff;
    padding: 0.8rem 1.5rem;
    border-radius: 10px;
    font-weight: 600;
    font-size: 0.95rem;
    transition: transform 0.35s cubic-bezier(.34,1.56,.64,1);
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error-toast { background: var(--red); }

  .admin-link {
    text-align: center;
    margin-top: 1.5rem;
  }
  .admin-link a {
    color: var(--muted);
    font-size: 0.8rem;
    text-decoration: none;
  }
  .admin-link a:hover { color: var(--accent); }

  .section-title {
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--accent2);
    margin-bottom: 1rem;
  }

  @media (max-width: 500px) {
    .two-col { grid-template-columns: 1fr; }
    .card { padding: 1.2rem; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>📋 OD Entry Form</h1>
  <p>Enter student details below — Branch &amp; Year fill automatically</p>
</div>

<div class="card">
  <!-- Staff Identity -->
  <div class="section-title">Your Details</div>
  <div class="two-col">
    <div class="field">
      <label>Your Name</label>
      <input type="text" id="enteredBy" placeholder="Staff name" />
    </div>
    <div class="field">
      <label>Camp Name</label>
      <input type="text" id="campName" placeholder="e.g. NSS Camp 2025" />
    </div>
  </div>

  <hr class="divider"/>

  <!-- Register Number -->
  <div class="section-title">Student Details</div>
  <div class="field">
    <label>Register Number</label>
    <input type="text" id="regNo" maxlength="9" placeholder="e.g. 126CCCDD" autocomplete="off"
           oninput="handleRegNo(this.value)" style="font-family:'Space Mono',monospace; font-size:1.1rem; letter-spacing:2px;"/>
    <div class="reg-hint">Format: <span>1 BB CCC DDD</span> — 9 digits total</div>
  </div>

  <div class="two-col">
    <div class="field">
      <label>Program / Branch <span class="auto-badge">AUTO</span></label>
      <input type="text" id="program" readonly placeholder="Auto-filled" />
    </div>
    <div class="field">
      <label>Year <span class="auto-badge">AUTO</span></label>
      <input type="text" id="year" placeholder="Auto-filled" />
    </div>
  </div>

  <div class="field">
    <label>Name of the Student</label>
    <input type="text" id="studentName" placeholder="Full name" />
  </div>

  <hr class="divider"/>

  <!-- OD Details -->
  <div class="section-title">OD Details</div>
  <div class="two-col">
    <div class="field">
      <label>OD Timing</label>
      <select id="odTiming">
        <option value="">Select</option>
        <option value="Full Day">Full Day</option>
        <option value="Half Day - FN">Half Day - FN (Forenoon)</option>
        <option value="Half Day - AN">Half Day - AN (Afternoon)</option>
      </select>
    </div>
    <div class="field">
      <label>Place</label>
      <input type="text" id="place" placeholder="Location / venue" />
    </div>
  </div>

  <div class="field">
    <label>Activity Description</label>
    <textarea id="activityDesc" placeholder="Describe the activity or event..."></textarea>
  </div>

  <div class="two-col">
    <div class="field">
      <label>From Date</label>
      <input type="date" id="fromDate" />
    </div>
    <div class="field">
      <label>To Date</label>
      <input type="date" id="toDate" />
    </div>
  </div>

  <button class="submit-btn" id="submitBtn" onclick="submitEntry()">Submit Entry</button>
</div>

<div class="admin-link">
  <a href="admin.html">🔐 Admin Dashboard →</a>
</div>

<div class="toast" id="toast"></div>

<script>
  // Init Supabase
  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function handleRegNo(val) {
    const progInput = document.getElementById('program');
    const yearInput = document.getElementById('year');

    progInput.classList.remove('filled', 'error');
    yearInput.classList.remove('filled', 'error');

    if (val.length !== 9) {
      progInput.value = '';
      yearInput.value = '';
      return;
    }

    const result = parseRegisterNo(val);
    if (!result) {
      progInput.value = 'Invalid format';
      progInput.classList.add('error');
      return;
    }

    progInput.value = result.branch;
    yearInput.value = result.year;
    progInput.classList.add('filled');

    if (result.year !== 'Fill Manually' && result.year !== '—') {
      yearInput.classList.add('filled');
      yearInput.readOnly = true;
    } else {
      yearInput.readOnly = false;
      yearInput.value = '';
      yearInput.placeholder = 'Enter year manually';
    }
  }

  async function submitEntry() {
    const btn = document.getElementById('submitBtn');
    const regNo = document.getElementById('regNo').value.trim();
    const studentName = document.getElementById('studentName').value.trim();
    const program = document.getElementById('program').value.trim();
    const year = document.getElementById('year').value.trim();
    const odTiming = document.getElementById('odTiming').value;
    const activityDesc = document.getElementById('activityDesc').value.trim();
    const place = document.getElementById('place').value.trim();
    const fromDate = document.getElementById('fromDate').value;
    const toDate = document.getElementById('toDate').value;
    const enteredBy = document.getElementById('enteredBy').value.trim();
    const campName = document.getElementById('campName').value.trim();

    if (!regNo || regNo.length !== 9) { showToast('Enter a valid 9-digit Register Number', true); return; }
    if (!studentName) { showToast('Enter student name', true); return; }
    if (!enteredBy) { showToast('Enter your name', true); return; }
    if (!campName) { showToast('Enter camp name', true); return; }
    if (!odTiming) { showToast('Select OD timing', true); return; }
    if (!fromDate || !toDate) { showToast('Select From and To dates', true); return; }

    btn.disabled = true;
    btn.textContent = 'Submitting...';

    const { error } = await db.from('od_entries').insert({
      register_no: regNo,
      student_name: studentName,
      program,
      year,
      od_timing: odTiming,
      activity_description: activityDesc,
      place,
      from_date: fromDate,
      to_date: toDate,
      entered_by: enteredBy,
      camp_name: campName,
    });

    btn.disabled = false;
    btn.textContent = 'Submit Entry';

    if (error) {
      console.error(error);
      showToast('Error saving. Check Supabase config.', true);
    } else {
      showToast('✅ Entry saved successfully!');
      clearForm();
    }
  }

  function clearForm() {
    ['regNo','studentName','activityDesc','place','fromDate','toDate'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('odTiming').value = '';
    const prog = document.getElementById('program');
    const yr = document.getElementById('year');
    prog.value = ''; prog.classList.remove('filled','error');
    yr.value = '';   yr.classList.remove('filled','error');
    yr.readOnly = true;
    yr.placeholder = 'Auto-filled';
  }

  function showToast(msg, isError=false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast' + (isError ? ' error-toast' : '');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }
</script>
</body>
</html>
