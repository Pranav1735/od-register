<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OD Admin Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<script src="config.js"></script>
<script src="branches.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #030712;
    --card: rgba(17, 24, 39, 0.7);
    --border: rgba(255, 255, 255, 0.1);
    --accent: #6366f1;
    --text: #f9fafb;
    --muted: #9ca3af;
    --glass: rgba(255, 255, 255, 0.03);
    --input-bg: rgba(0, 0, 0, 0.3);
    --green: #10b981;
    --red: #f43f5e;
    --yellow: #f59e0b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    background-image: 
      radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.1) 0px, transparent 50%),
      radial-gradient(at 100% 100%, rgba(124, 58, 237, 0.1) 0px, transparent 50%);
    color: var(--text);
    min-height: 100vh;
  }

  /* LOGIN */
  .login-wrap {
    display: flex; align-items: center; justify-content: center; min-height: 100vh;
  }
  .login-card {
    background: var(--card);
    backdrop-filter: blur(16px);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 3rem;
    width: 380px;
    text-align: center;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
  }
  .login-card h2 { font-family: 'Outfit', sans-serif; color: var(--accent); margin-bottom: 0.5rem; font-size: 1.8rem; }
  .login-card p { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; }
  .login-card input {
    width: 100%; background: var(--input-bg); border: 1px solid var(--border);
    border-radius: 12px; color: var(--text); font-family: inherit;
    font-size: 1.1rem; padding: 0.8rem 1rem; outline: none; text-align: center;
    letter-spacing: 4px; margin-bottom: 1.5rem; transition: 0.3s;
  }
  .login-card input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15); }
  .login-btn {
    width: 100%; background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
    color: #fff; border: none; border-radius: 12px;
    font-family: 'Outfit', sans-serif; font-size: 1rem; font-weight: 600;
    padding: 0.9rem; cursor: pointer; transition: 0.3s;
  }
  .login-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .login-err { color: var(--red); font-size: 0.85rem; margin-top: 1rem; font-weight: 500; display: none; }

  /* DASHBOARD */
  #dashboard { padding-bottom: 3rem; }

  .topbar {
    background: rgba(3, 7, 18, 0.5);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 1.2rem 2.5rem; display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 1rem; sticky; top: 0; z-index: 100;
  }
  .topbar h1 { font-family: 'Outfit', sans-serif; color: #fff; font-size: 1.4rem; font-weight: 700; }

  .topbar-actions { display: flex; gap: 0.75rem; }
  .btn {
    padding: 0.6rem 1.2rem; border-radius: 10px; font-family: 'Outfit', sans-serif;
    font-size: 0.85rem; font-weight: 600; cursor: pointer; border: 1px solid var(--border);
    transition: all 0.2s; background: var(--input-bg); color: var(--text);
  }
  .btn:hover { background: var(--border); transform: translateY(-1px); }
  .btn-green { background: var(--accent); border: none; color: #fff; }
  .btn-green:hover { filter: brightness(1.1); }

  .stats-row {
    display: flex; gap: 1.5rem; padding: 2rem 2.5rem; flex-wrap: wrap;
  }
  .stat-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 20px;
    padding: 1.5rem; min-width: 180px; flex: 1;
    backdrop-filter: blur(10px);
  }
  .stat-card .num { font-family: 'Outfit', sans-serif; font-size: 2.2rem; font-weight: 700; color: var(--accent); }
  .stat-card .lbl { font-size: 0.8rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 0.2rem; }

  .filters {
    padding: 0 2.5rem 2rem; display: flex; gap: 1.2rem; flex-wrap: wrap; align-items: flex-end;
  }
  .filter-field { display: flex; flex-direction: column; gap: 0.5rem; }
  .filter-field label { font-size: 0.75rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
  .filter-field input, .filter-field select {
    background: var(--input-bg); border: 1px solid var(--border); border-radius: 10px;
    color: var(--text); font-family: inherit; font-size: 0.85rem;
    padding: 0.6rem 1rem; outline: none; transition: 0.2s;
  }
  .filter-field input:focus, .filter-field select:focus { border-color: var(--accent); background: rgba(99, 102, 241, 0.05); }

  .live-dot {
    width: 10px; height: 10px; background: var(--green); border-radius: 50%;
    display: inline-block; margin-right: 10px; box-shadow: 0 0 10px var(--green);
    animation: p-pulse 2s infinite;
  }
  @keyframes p-pulse { 0%,100%{opacity:1; transform:scale(1)} 50%{opacity:0.4; transform:scale(0.8)} }

  .table-wrap { padding: 0 2.5rem; overflow-x: auto; }
  table {
    width: 100%; border-collapse: separate; border-spacing: 0; font-size: 0.9rem;
    background: var(--card); border: 1px solid var(--border); border-radius: 20px; overflow: hidden;
  }
  thead th {
    background: rgba(0, 0, 0, 0.2); color: var(--muted); font-weight: 700; font-size: 0.75rem;
    text-transform: uppercase; letter-spacing: 0.1em; padding: 1.2rem 1rem; text-align: left;
    border-bottom: 1px solid var(--border);
  }
  tbody tr { transition: 0.2s; }
  tbody tr:hover { background: rgba(255, 255, 255, 0.03); }
  tbody td { padding: 1rem; border-bottom: 1px solid var(--border); }
  tbody tr:last-child td { border-bottom: none; }

  .badge {
    display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 6px;
    font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.02em;
  }
  .badge-blue  { background: rgba(99, 102, 241, 0.1); color: #818cf8; border: 1px solid rgba(99, 102, 241, 0.2); }
  .badge-green { background: rgba(16, 185, 129, 0.1); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.2); }
  .badge-yellow{ background: rgba(245, 158, 11, 0.1); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.2); }

  .reg-mono { font-family: 'Space Mono', monospace; font-size: 0.85rem; color: #818cf8; font-weight: 600; }

  .empty-state { text-align: center; padding: 5rem; color: var(--muted); font-size: 1rem; }

  /* Fix for select dropdown visibility */
  select option {
    background-color: #111827;
    color: #f9fafb;
    padding: 10px;
  }

  .delete-btn {
    background: rgba(244, 63, 94, 0.1); border: 1px solid rgba(244, 63, 94, 0.2);
    border-radius: 8px; color: var(--red); font-size: 1rem; padding: 6px; cursor: pointer;
    transition: 0.2s; display: flex; align-items: center; justify-content: center;
  }
  .delete-btn:hover { background: var(--red); color: #fff; }

  @media(max-width:800px) {
    .topbar, .stats-row, .filters, .table-wrap { padding-left: 1.2rem; padding-right: 1.2rem; }
    .stats-row { gap: 1rem; }
    .stat-card { min-width: 140px; padding: 1.2rem; }
    .stat-card .num { font-size: 1.8rem; }
    .topbar h1 { font-size: 1.2rem; }
  }

  @media(max-width:500px) {
    .filters { flex-direction: column; align-items: stretch; }
    .filter-field input, .filter-field select { width: 100% !important; }
    .topbar { padding: 1rem; }
    .topbar-actions { width: 100%; justify-content: space-between; }
    .btn { flex: 1; padding: 0.5rem; font-size: 0.75rem; text-align: center; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <h2>🔐 Admin</h2>
    <p>Enter admin password to view all OD entries</p>
    <input type="password" id="pwInput" placeholder="••••••••" onkeydown="if(event.key==='Enter') login()"/>
    <button class="login-btn" onclick="login()">Enter Dashboard</button>
    <div class="login-err" id="loginErr">Wrong password. Try again.</div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="topbar">
    <div>
      <span class="live-dot"></span>
      <h1 style="display:inline">OD Admin Dashboard</h1>
    </div>
    <div class="topbar-actions">
      <button class="btn btn-green" onclick="exportExcel()">⬇ Export Excel</button>
      <button class="btn btn-muted" onclick="loadEntries()">↻ Refresh</button>
      <a href="index.html" style="text-decoration:none">
        <button class="btn btn-muted">+ New Entry</button>
      </a>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="num" id="statTotal">—</div>
      <div class="lbl">Total Entries</div>
    </div>
    <div class="stat-card">
      <div class="num" id="statCamps">—</div>
      <div class="lbl">Camps</div>
    </div>
    <div class="stat-card">
      <div class="num" id="statToday">—</div>
      <div class="lbl">Added Today</div>
    </div>
  </div>

  <div class="filters">
    <div class="filter-field">
      <label>Search</label>
      <input type="text" id="filterSearch" placeholder="Name / Reg No / Branch…" oninput="applyFilters()" style="width:220px"/>
    </div>
    <div class="filter-field">
      <label>Camp</label>
      <select id="filterCamp" onchange="applyFilters()">
        <option value="">All Camps</option>
      </select>
    </div>
    <div class="filter-field">
      <label>From Date</label>
      <input type="date" id="filterFrom" onchange="applyFilters()"/>
    </div>
    <div class="filter-field">
      <label>To Date</label>
      <input type="date" id="filterTo" onchange="applyFilters()"/>
    </div>
    <div class="filter-field">
      <label>&nbsp;</label>
      <button class="btn btn-muted" onclick="clearFilters()">Clear</button>
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Register No</th>
          <th>Student Name</th>
          <th>Program</th>
          <th>Year</th>
          <th>OD Timing</th>
          <th>Activity</th>
          <th>Place</th>
          <th>From</th>
          <th>To</th>
          <th>Camp</th>
          <th>Entered By</th>
          <th>Added At</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="14" class="empty-state">Loading…</td></tr>
      </tbody>
    </table>
  </div>

  <div style="text-align:center; padding:2rem 0; border-top:1px solid var(--border); color:var(--muted); font-size:0.8rem;">
    Powered by <a href="http://www.xiqro.in" target="_blank" style="color:var(--accent); text-decoration:none; font-weight:600;">Xiqro - Next Gen</a>
  </div>
</div>

<script>
  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let allEntries = [];
  let filteredEntries = [];

  function login() {
    const pw = document.getElementById('pwInput').value;
    if (pw === ADMIN_PASSWORD) {
      document.getElementById('loginWrap').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      loadEntries();
      subscribeRealtime();
    } else {
      document.getElementById('loginErr').style.display = 'block';
    }
  }

  async function loadEntries() {
    const { data, error } = await db
      .from('od_entries')
      .select('*')
      .order('created_at', { ascending: false });

    if (error) { console.error(error); return; }
    allEntries = data || [];
    populateCampFilter();
    applyFilters();
    updateStats();
  }

  function subscribeRealtime() {
    db.channel('od_entries_changes')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'od_entries' }, () => {
        loadEntries();
      })
      .subscribe();
  }

  function updateStats() {
    document.getElementById('statTotal').textContent = allEntries.length;
    const camps = new Set(allEntries.map(e => e.camp_name).filter(Boolean));
    document.getElementById('statCamps').textContent = camps.size;
    const today = new Date().toISOString().slice(0,10);
    const todayCount = allEntries.filter(e => e.created_at && e.created_at.slice(0,10) === today).length;
    document.getElementById('statToday').textContent = todayCount;
  }

  function populateCampFilter() {
    const sel = document.getElementById('filterCamp');
    const current = sel.value;
    const camps = [...new Set(allEntries.map(e => e.camp_name).filter(Boolean))].sort();
    sel.innerHTML = '<option value="">All Camps</option>';
    camps.forEach(c => {
      const o = document.createElement('option');
      o.value = c; o.textContent = c;
      if (c === current) o.selected = true;
      sel.appendChild(o);
    });
  }

  function applyFilters() {
    const search = document.getElementById('filterSearch').value.toLowerCase();
    const camp   = document.getElementById('filterCamp').value;
    const from   = document.getElementById('filterFrom').value;
    const to     = document.getElementById('filterTo').value;

    filteredEntries = allEntries.filter(e => {
      if (camp && e.camp_name !== camp) return false;
      if (from && e.from_date && e.from_date < from) return false;
      if (to && e.to_date && e.to_date > to) return false;
      if (search) {
        const hay = [e.register_no, e.student_name, e.program, e.camp_name, e.entered_by, e.place].join(' ').toLowerCase();
        if (!hay.includes(search)) return false;
      }
      return true;
    });

    renderTable();
  }

  function clearFilters() {
    document.getElementById('filterSearch').value = '';
    document.getElementById('filterCamp').value = '';
    document.getElementById('filterFrom').value = '';
    document.getElementById('filterTo').value = '';
    applyFilters();
  }

  function renderTable() {
    const tbody = document.getElementById('tableBody');
    if (filteredEntries.length === 0) {
      tbody.innerHTML = '<tr><td colspan="14" class="empty-state">No entries found</td></tr>';
      return;
    }
    tbody.innerHTML = filteredEntries.map((e, i) => `
      <tr>
        <td style="color:var(--muted)">${i+1}</td>
        <td><span class="reg-mono">${e.register_no || '—'}</span></td>
        <td>${e.student_name || '—'}</td>
        <td style="max-width:180px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis" title="${e.program||''}">${e.program || '—'}</td>
        <td><span class="badge badge-blue">${e.year || '—'}</span></td>
        <td><span class="badge ${e.od_timing==='FULL DAY'?'badge-green':'badge-yellow'}">${e.od_timing || '—'}</span></td>
        <td style="max-width:160px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis" title="${e.activity_description||''}">${e.activity_description || '—'}</td>
        <td>${e.place || '—'}</td>
        <td>${e.from_date || '—'}</td>
        <td>${e.to_date || '—'}</td>
        <td style="color:var(--accent)">${e.camp_name || '—'}</td>
        <td>${e.entered_by || '—'}</td>
        <td style="color:var(--muted); font-size:0.75rem">${e.created_at ? new Date(e.created_at).toLocaleString('en-IN') : '—'}</td>
        <td><button class="delete-btn" onclick="deleteEntry('${e.id}')">✕</button></td>
      </tr>
    `).join('');
  }

  async function deleteEntry(id) {
    if (!confirm('Delete this entry?')) return;
    const { error } = await db.from('od_entries').delete().eq('id', id);
    if (!error) loadEntries();
  }

  function exportExcel() {
    // Create a copy and sort by Camp Name, then by From Date
    const sorted = [...filteredEntries].sort((a, b) => {
      const campA = (a.camp_name || "").toLowerCase();
      const campB = (b.camp_name || "").toLowerCase();
      if (campA < campB) return -1;
      if (campA > campB) return 1;

      const dateA = a.from_date || "0000-00-00";
      const dateB = b.from_date || "0000-00-00";
      return dateA.localeCompare(dateB);
    });

    const rows = sorted.map((e, i) => ({
      'SI No': i + 1,
      'Register No': e.register_no,
      'Student Name': e.student_name,
      'Program': e.program,
      'Year': e.year,
      'OD Timing': e.od_timing,
      'Activity Description': e.activity_description,
      'Place': e.place,
      'From Date': e.from_date,
      'To Date': e.to_date,
      'Camp Name': e.camp_name,
      'Entered By': e.entered_by,
      'Added At': e.created_at ? new Date(e.created_at).toLocaleString('en-IN') : '',
    }));

    const ws = XLSX.utils.json_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'OD Entries');

    // Style column widths
    ws['!cols'] = [
      {wch:6},{wch:14},{wch:22},{wch:38},{wch:10},{wch:18},
      {wch:30},{wch:18},{wch:12},{wch:12},{wch:20},{wch:16},{wch:22}
    ];

    XLSX.writeFile(wb, `OD_Register_${new Date().toISOString().slice(0,10)}.xlsx`);
  }
</script>
</body>
</html>
