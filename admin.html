<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OD Admin Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<script src="config.js"></script>
<script src="branches.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --accent: #4f9cf9;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #f59e0b;
    --text: #e8eaf0;
    --muted: #6b7280;
    --input-bg: #12141e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* LOGIN */
  .login-wrap {
    display: flex; align-items: center; justify-content: center; min-height: 100vh;
  }
  .login-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
    padding: 2.5rem; width: 340px; text-align: center;
  }
  .login-card h2 { font-family: 'Space Mono', monospace; color: var(--accent); margin-bottom: 0.5rem; }
  .login-card p { color: var(--muted); font-size: 0.85rem; margin-bottom: 1.5rem; }
  .login-card input {
    width: 100%; background: var(--input-bg); border: 1.5px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 1rem; padding: 0.7rem 1rem; outline: none; text-align: center;
    letter-spacing: 3px; margin-bottom: 1rem;
  }
  .login-card input:focus { border-color: var(--accent); }
  .login-btn {
    width: 100%; background: var(--accent); color: #fff; border: none; border-radius: 8px;
    font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 600;
    padding: 0.75rem; cursor: pointer;
  }
  .login-btn:hover { opacity: 0.85; }
  .login-err { color: var(--red); font-size: 0.85rem; margin-top: 0.75rem; display: none; }

  /* DASHBOARD */
  #dashboard { display: none; }

  .topbar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 1rem;
  }
  .topbar h1 { font-family: 'Space Mono', monospace; color: var(--accent); font-size: 1.15rem; }

  .topbar-actions { display: flex; gap: 0.75rem; flex-wrap: wrap; }
  .btn {
    padding: 0.5rem 1rem; border-radius: 7px; font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem; font-weight: 600; cursor: pointer; border: none; transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.8; }
  .btn-green { background: var(--green); color: #fff; }
  .btn-muted { background: var(--border); color: var(--text); }

  .stats-row {
    display: flex; gap: 1rem; padding: 1.5rem 2rem; flex-wrap: wrap;
  }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 1rem 1.5rem; min-width: 140px; flex: 1;
  }
  .stat-card .num { font-family: 'Space Mono', monospace; font-size: 1.8rem; color: var(--accent); }
  .stat-card .lbl { font-size: 0.75rem; color: var(--muted); margin-top: 0.2rem; }

  .filters {
    padding: 0 2rem 1rem; display: flex; gap: 1rem; flex-wrap: wrap; align-items: flex-end;
  }
  .filter-field { display: flex; flex-direction: column; gap: 0.3rem; }
  .filter-field label { font-size: 0.7rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .filter-field input, .filter-field select {
    background: var(--input-bg); border: 1.5px solid var(--border); border-radius: 7px;
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.85rem;
    padding: 0.45rem 0.75rem; outline: none;
  }
  .filter-field input:focus, .filter-field select:focus { border-color: var(--accent); }
  .filter-field select option { background: var(--surface); }

  .live-dot {
    width: 8px; height: 8px; background: var(--green); border-radius: 50%;
    display: inline-block; margin-right: 6px; animation: pulse 1.5s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .table-wrap { padding: 0 2rem 2rem; overflow-x: auto; }
  table {
    width: 100%; border-collapse: collapse; font-size: 0.85rem;
    background: var(--surface); border-radius: 10px; overflow: hidden;
  }
  thead th {
    background: #12141e; color: var(--muted); font-weight: 600; font-size: 0.72rem;
    text-transform: uppercase; letter-spacing: 0.08em; padding: 0.75rem 1rem; text-align: left;
    border-bottom: 1px solid var(--border);
  }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #1e2132; }
  tbody td { padding: 0.7rem 1rem; vertical-align: middle; }

  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 5px;
    font-size: 0.7rem; font-weight: 600;
  }
  .badge-blue  { background: #1a2f50; color: var(--accent); }
  .badge-green { background: #0d2a0d; color: var(--green); }
  .badge-yellow{ background: #2a1f00; color: var(--yellow); }

  .reg-mono { font-family: 'Space Mono', monospace; font-size: 0.8rem; color: var(--accent); }

  .empty-state {
    text-align: center; padding: 3rem; color: var(--muted); font-size: 0.9rem;
  }

  .delete-btn {
    background: none; border: 1px solid var(--border); border-radius: 5px;
    color: var(--muted); font-size: 0.75rem; padding: 3px 8px; cursor: pointer;
  }
  .delete-btn:hover { border-color: var(--red); color: var(--red); }

  @media(max-width:600px) {
    .topbar, .stats-row, .filters, .table-wrap { padding-left: 1rem; padding-right: 1rem; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <h2>🔐 Admin</h2>
    <p>Enter admin password to view all OD entries</p>
    <input type="password" id="pwInput" placeholder="••••••••" onkeydown="if(event.key==='Enter') login()"/>
    <button class="login-btn" onclick="login()">Enter Dashboard</button>
    <div class="login-err" id="loginErr">Wrong password. Try again.</div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="topbar">
    <div>
      <span class="live-dot"></span>
      <h1 style="display:inline">OD Admin Dashboard</h1>
    </div>
    <div class="topbar-actions">
      <button class="btn btn-green" onclick="exportExcel()">⬇ Export Excel</button>
      <button class="btn btn-muted" onclick="loadEntries()">↻ Refresh</button>
      <a href="index.html" style="text-decoration:none">
        <button class="btn btn-muted">+ New Entry</button>
      </a>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="num" id="statTotal">—</div>
      <div class="lbl">Total Entries</div>
    </div>
    <div class="stat-card">
      <div class="num" id="statCamps">—</div>
      <div class="lbl">Camps</div>
    </div>
    <div class="stat-card">
      <div class="num" id="statToday">—</div>
      <div class="lbl">Added Today</div>
    </div>
  </div>

  <div class="filters">
    <div class="filter-field">
      <label>Search</label>
      <input type="text" id="filterSearch" placeholder="Name / Reg No / Branch…" oninput="applyFilters()" style="width:220px"/>
    </div>
    <div class="filter-field">
      <label>Camp</label>
      <select id="filterCamp" onchange="applyFilters()">
        <option value="">All Camps</option>
      </select>
    </div>
    <div class="filter-field">
      <label>From Date</label>
      <input type="date" id="filterFrom" onchange="applyFilters()"/>
    </div>
    <div class="filter-field">
      <label>To Date</label>
      <input type="date" id="filterTo" onchange="applyFilters()"/>
    </div>
    <div class="filter-field">
      <label>&nbsp;</label>
      <button class="btn btn-muted" onclick="clearFilters()">Clear</button>
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Register No</th>
          <th>Student Name</th>
          <th>Program</th>
          <th>Year</th>
          <th>OD Timing</th>
          <th>Activity</th>
          <th>Place</th>
          <th>From</th>
          <th>To</th>
          <th>Camp</th>
          <th>Entered By</th>
          <th>Added At</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="14" class="empty-state">Loading…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let allEntries = [];
  let filteredEntries = [];

  function login() {
    const pw = document.getElementById('pwInput').value;
    if (pw === ADMIN_PASSWORD) {
      document.getElementById('loginWrap').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      loadEntries();
      subscribeRealtime();
    } else {
      document.getElementById('loginErr').style.display = 'block';
    }
  }

  async function loadEntries() {
    const { data, error } = await db
      .from('od_entries')
      .select('*')
      .order('created_at', { ascending: false });

    if (error) { console.error(error); return; }
    allEntries = data || [];
    populateCampFilter();
    applyFilters();
    updateStats();
  }

  function subscribeRealtime() {
    db.channel('od_entries_changes')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'od_entries' }, () => {
        loadEntries();
      })
      .subscribe();
  }

  function updateStats() {
    document.getElementById('statTotal').textContent = allEntries.length;
    const camps = new Set(allEntries.map(e => e.camp_name).filter(Boolean));
    document.getElementById('statCamps').textContent = camps.size;
    const today = new Date().toISOString().slice(0,10);
    const todayCount = allEntries.filter(e => e.created_at && e.created_at.slice(0,10) === today).length;
    document.getElementById('statToday').textContent = todayCount;
  }

  function populateCampFilter() {
    const sel = document.getElementById('filterCamp');
    const current = sel.value;
    const camps = [...new Set(allEntries.map(e => e.camp_name).filter(Boolean))].sort();
    sel.innerHTML = '<option value="">All Camps</option>';
    camps.forEach(c => {
      const o = document.createElement('option');
      o.value = c; o.textContent = c;
      if (c === current) o.selected = true;
      sel.appendChild(o);
    });
  }

  function applyFilters() {
    const search = document.getElementById('filterSearch').value.toLowerCase();
    const camp   = document.getElementById('filterCamp').value;
    const from   = document.getElementById('filterFrom').value;
    const to     = document.getElementById('filterTo').value;

    filteredEntries = allEntries.filter(e => {
      if (camp && e.camp_name !== camp) return false;
      if (from && e.from_date && e.from_date < from) return false;
      if (to && e.to_date && e.to_date > to) return false;
      if (search) {
        const hay = [e.register_no, e.student_name, e.program, e.camp_name, e.entered_by, e.place].join(' ').toLowerCase();
        if (!hay.includes(search)) return false;
      }
      return true;
    });

    renderTable();
  }

  function clearFilters() {
    document.getElementById('filterSearch').value = '';
    document.getElementById('filterCamp').value = '';
    document.getElementById('filterFrom').value = '';
    document.getElementById('filterTo').value = '';
    applyFilters();
  }

  function renderTable() {
    const tbody = document.getElementById('tableBody');
    if (filteredEntries.length === 0) {
      tbody.innerHTML = '<tr><td colspan="14" class="empty-state">No entries found</td></tr>';
      return;
    }
    tbody.innerHTML = filteredEntries.map((e, i) => `
      <tr>
        <td style="color:var(--muted)">${i+1}</td>
        <td><span class="reg-mono">${e.register_no || '—'}</span></td>
        <td>${e.student_name || '—'}</td>
        <td style="max-width:180px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis" title="${e.program||''}">${e.program || '—'}</td>
        <td><span class="badge badge-blue">${e.year || '—'}</span></td>
        <td><span class="badge ${e.od_timing==='Full Day'?'badge-green':'badge-yellow'}">${e.od_timing || '—'}</span></td>
        <td style="max-width:160px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis" title="${e.activity_description||''}">${e.activity_description || '—'}</td>
        <td>${e.place || '—'}</td>
        <td>${e.from_date || '—'}</td>
        <td>${e.to_date || '—'}</td>
        <td style="color:var(--accent)">${e.camp_name || '—'}</td>
        <td>${e.entered_by || '—'}</td>
        <td style="color:var(--muted); font-size:0.75rem">${e.created_at ? new Date(e.created_at).toLocaleString('en-IN') : '—'}</td>
        <td><button class="delete-btn" onclick="deleteEntry('${e.id}')">✕</button></td>
      </tr>
    `).join('');
  }

  async function deleteEntry(id) {
    if (!confirm('Delete this entry?')) return;
    const { error } = await db.from('od_entries').delete().eq('id', id);
    if (!error) loadEntries();
  }

  function exportExcel() {
    const rows = filteredEntries.map((e, i) => ({
      'SI No': i + 1,
      'Register No': e.register_no,
      'Student Name': e.student_name,
      'Program': e.program,
      'Year': e.year,
      'OD Timing': e.od_timing,
      'Activity Description': e.activity_description,
      'Place': e.place,
      'From Date': e.from_date,
      'To Date': e.to_date,
      'Camp Name': e.camp_name,
      'Entered By': e.entered_by,
      'Added At': e.created_at ? new Date(e.created_at).toLocaleString('en-IN') : '',
    }));

    const ws = XLSX.utils.json_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'OD Entries');

    // Style column widths
    ws['!cols'] = [
      {wch:6},{wch:14},{wch:22},{wch:38},{wch:10},{wch:18},
      {wch:30},{wch:18},{wch:12},{wch:12},{wch:20},{wch:16},{wch:22}
    ];

    XLSX.writeFile(wb, `OD_Register_${new Date().toISOString().slice(0,10)}.xlsx`);
  }
</script>
</body>
</html>
